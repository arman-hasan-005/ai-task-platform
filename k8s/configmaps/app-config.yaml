apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_QUEUE_NAME: "task_queue"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  BCRYPT_SALT_ROUNDS: "12"
  LOG_LEVEL: "info"
  POLL_INTERVAL_SECONDS: "1"
  FRONTEND_URL: "http://frontend-service:3000"
