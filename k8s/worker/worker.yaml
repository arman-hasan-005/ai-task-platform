apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: armanhasan005/ai-task-worker:latest
          env:
            - name: MONGODB_URI
              value: mongodb://mongodb:27017/ai_task_platform
            - name: REDIS_PORT
              value: "6379"
