name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-task-backend ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-task-backend

      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend

      - name: Build and push worker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-task-worker ./worker
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-task-worker
